# ─────────────────────────────────────────────────────────────────────────────
# LaunchForge — Google Cloud Build pipeline
# Inspired by AlexandrLebegue/domotique_ia/cloudbuild.yaml
#
# Deploys to Cloud Run on every push to main.
# Secrets are injected from Secret Manager — never hardcoded here.
#
# Required substitutions (set in Cloud Build trigger):
#   _PROJECT_ID   : GCP project ID
#   _REGION       : Cloud Run region  (e.g. europe-west1)
#   _SERVICE_NAME : Cloud Run service (e.g. launchforge)
#   _REGISTRY     : Artifact Registry repo
#                   (e.g. europe-west1-docker.pkg.dev/$PROJECT_ID/launchforge)
#
# Required secrets in Secret Manager:
#   openrouter-api-key   : OPENROUTER_API_KEY
#   launchforge-jwt-secret : JWT_SECRET
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _PROJECT_ID:   your-gcp-project-id
  _REGION:       europe-west1
  _SERVICE_NAME: launchforge
  _REGISTRY:     europe-west1-docker.pkg.dev/your-gcp-project-id/launchforge

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s   # 20 minutes

steps:
  # ── Step 1 : Build the Docker image ────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=${_REGISTRY}/${_SERVICE_NAME}:$SHORT_SHA
      - --tag=${_REGISTRY}/${_SERVICE_NAME}:latest
      - --cache-from=${_REGISTRY}/${_SERVICE_NAME}:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - .
    env:
      - DOCKER_BUILDKIT=1

  # ── Step 2 : Push image to Artifact Registry ───────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/${_SERVICE_NAME}

  # ── Step 3 : Deploy to Cloud Run ───────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGISTRY}/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --port=3000
      # ── Env vars (non-secret) ────────────────────────────────────
      - --set-env-vars=NODE_ENV=production,PORT=3000,DB_PATH=/app/data/launchforge.db
      # ── Secrets injected from Secret Manager ────────────────────
      # Format: ENV_VAR=secret-name:version
      - --set-secrets=OPENROUTER_API_KEY=openrouter-api-key:latest
      - --set-secrets=JWT_SECRET=launchforge-jwt-secret:latest

images:
  - ${_REGISTRY}/${_SERVICE_NAME}:$SHORT_SHA
  - ${_REGISTRY}/${_SERVICE_NAME}:latest
