<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>LaunchForge — La promotion de votre startup, forgée par l'IA</title>
    <meta name="description" content="Plan de lancement, calendrier éditorial, rédaction et publication automatique sur LinkedIn, X, Instagram et YouTube, métriques réelles et analyse IA. Pilotable depuis le web ou Telegram. RGPD : export et suppression de vos données en libre-service." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#121110" />

    <!-- Open Graph (compléter og:url et passer og:image en URL absolue au déploiement) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LaunchForge" />
    <meta property="og:title" content="LaunchForge — La promotion de votre startup, forgée par l'IA" />
    <meta property="og:description" content="De l'idée à la traction : plan de lancement, contenu rédigé et publié automatiquement, métriques et analyse — vous gardez le contrôle." />
    <meta property="og:image" content="/landing/performances.png" />
    <meta property="og:locale" content="fr_FR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LaunchForge — La promotion de votre startup, forgée par l'IA" />
    <meta name="twitter:description" content="Plan de lancement, publication multi-plateformes, métriques et analyse IA — vous gardez le contrôle." />
    <meta name="twitter:image" content="/landing/performances.png" />

    <!-- Données structurées -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "LaunchForge",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Hub de promotion pour startups et solopreneurs : plan de lancement, calendrier éditorial, publication multi-plateformes, métriques et analyse IA.",
      "inLanguage": "fr",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR", "description": "Gratuit pendant la bêta" }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "Combien coûte LaunchForge ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Rien pendant la bêta — pas de carte bancaire demandée. Un tarif simple sera annoncé à la sortie de bêta." } },
        { "@type": "Question", "name": "L'IA peut-elle publier sans mon accord ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Non. La publication automatique est un réglage opt-in, post par post. Par défaut, tout contenu attend votre validation, dans l'app ou depuis Telegram." } },
        { "@type": "Question", "name": "Comment mes comptes sociaux sont-ils connectés ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Par OAuth via Composio : vous autorisez chaque plateforme dans une fenêtre officielle et pouvez révoquer chaque connexion en un clic. LaunchForge ne voit jamais vos mots de passe." } },
        { "@type": "Question", "name": "Que deviennent mes données ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Export complet en JSON et suppression définitive du compte en libre-service, conformément au RGPD (articles 17 et 20). Pas de cookies tiers." } },
        { "@type": "Question", "name": "Quelles plateformes sont couvertes ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Publication automatique sur LinkedIn, X, Instagram et YouTube ; Reddit, Facebook et les autres via l'assistant IA." } }
      ]
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
